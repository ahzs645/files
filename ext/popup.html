<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
    }
    .header {
      background: linear-gradient(135deg, #003366, #1a5276);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 11px;
      opacity: 0.8;
    }
    .content {
      padding: 16px;
    }
    .status {
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status.error {
      border-color: #e74c3c;
      color: #e74c3c;
    }
    .status.success {
      border-color: #27ae60;
      color: #27ae60;
    }
    .status.warning {
      border-color: #e67e22;
      color: #e67e22;
    }
    .status-icon {
      font-size: 16px;
      flex-shrink: 0;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #dee2e6;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active {
      display: block;
    }
    .progress-fill {
      height: 100%;
      background: #003366;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #003366;
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      background: #00264d;
    }
    .export-row {
      display: flex;
      gap: 8px;
    }
    .export-row button {
      flex: 1;
    }
    .btn-csv {
      background: #27ae60;
      color: white;
    }
    .btn-csv:hover:not(:disabled) {
      background: #219a52;
    }
    .btn-json {
      background: #2980b9;
      color: white;
    }
    .btn-json:hover:not(:disabled) {
      background: #2472a4;
    }
    .btn-resume {
      background: #e67e22;
      color: white;
    }
    .btn-resume:hover:not(:disabled) {
      background: #cf6d17;
    }
    .stats {
      margin-top: 12px;
      font-size: 12px;
      color: #6c757d;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>BC Bid Scraper</h1>
    <p>Contract Award Data Exporter</p>
  </div>
  <div class="content">
    <div class="status" id="status">
      <span class="status-icon" id="statusIcon">&#9432;</span>
      <span id="statusText">Navigate to BC Bid contract browse page, then click Scrape.</span>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="btn-group">
      <button class="btn-primary" id="btnScrape">Scrape All Pages</button>
      <button class="btn-resume" id="btnResume" style="display:none">Resume Scraping</button>
      <div class="export-row">
        <button class="btn-csv" id="btnCsv" disabled>Export CSV</button>
        <button class="btn-json" id="btnJson" disabled>Export JSON</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
